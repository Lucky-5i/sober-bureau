baseURL = 'https://sober.lucky-5i.vip/'
languageCode = 'zh-cn'
title = '人间清醒局'
theme = 'PaperMod'
rssLimit = 20

[params]
  description = "情感、两性、星座、心理、塔罗 - 不鸡汤，不说教，只讲人间清醒事"
  author = "Lucky (INTJ · 射手座)"
  
  [params.assets]
    favicon = "/logo.jpg"
    favicon16x16 = "/logo.jpg"
    favicon32x32 = "/logo.jpg"
    apple_touch_icon = "/logo.jpg"
  
  [params.label]
    icon = "/logo.jpg"
    iconHeight = 35
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

[params.homeInfoParams]
  Title = "欢迎来到人间清醒局"
  Content = "这里聊情感、两性、星座、心理和塔罗。不说教，不鸡汤，只讲人间清醒事。"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
