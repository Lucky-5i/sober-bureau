<!-- 网站运行时间 -->
<div style="text-align: center; padding: 20px 0; color: var(--secondary); font-size: 14px;">
    <div id="site-runtime"></div>
</div>

<script>
// 网站运行时间计算
function updateRuntime() {
    const startTime = new Date('2026-02-25T22:00:00+08:00').getTime();
    const now = new Date().getTime();
    const diff = now - startTime;
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    document.getElementById('site-runtime').innerHTML = 
        `⏰ 本站已运行 ${days} 天 ${hours} 小时 ${minutes} 分 ${seconds} 秒`;
}

updateRuntime();
setInterval(updateRuntime, 1000);
</script>
